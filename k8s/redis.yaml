---
# Persistent storage for the Redis cell registry.
# Even if the Redis pod restarts, the world state survives.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: gol
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 512Mi
  # If your cluster has a default StorageClass (e.g. local-path on k3s),
  # you can omit storageClassName and it will be assigned automatically.
  # storageClassName: local-path

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: gol
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          args: ["--appendonly", "yes"]  # persist data to disk
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc

---
# ClusterIP service — reachable inside the cluster as redis.gol.svc.cluster.local
# Agent pods connect to it simply as "redis:6379" (within the same namespace).
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: gol
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
