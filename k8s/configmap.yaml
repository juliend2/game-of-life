---
# Shared configuration for all pods in the simulation.
# Change these values and reapply — no image rebuild needed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: gol-config
  namespace: gol
data:
  grid_width: "20"
  grid_height: "20"

  # How long each agent waits between ticks (in seconds).
  #
  # CONSTRAINT: must be >= 10. The agent logs a startup warning if it isn't.
  # A shorter interval races pod startup — a freshly spawned cell may not
  # have registered itself in Redis yet by the time its neighbors tick and
  # evaluate it, which causes false "dead" reads and unstable generations.
  tick_interval: "10"
