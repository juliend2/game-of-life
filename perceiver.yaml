---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: perceiver
  namespace: gol
  # The perceiver is the only eternal pod in the simulation.
  # Everything else is born and dies. The perceiver watches,
  # and when darkness falls, it speaks existence back into being.
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gol-perceiver
  template:
    metadata:
      labels:
        app: gol-perceiver
    spec:
      serviceAccountName: gol-perceiver
      containers:
        - name: perceiver
          # Whewn I'll have my cluster running on other machines, my registry
          # will live elsewhere, so modify this line:
          # image: your-registry/gol-perceiver:latest
          #
          # But for now, use this for local development only:
          image: localhost:5000/gol-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: GRID_WIDTH
              valueFrom:
                configMapKeyRef:
                  name: gol-config
                  key: grid_width
            - name: GRID_HEIGHT
              valueFrom:
                configMapKeyRef:
                  name: gol-config
                  key: grid_height
            - name: TICK_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: gol-config
                  key: tick_interval

            # How many consecutive empty polls before declaring extinction.
            # Set to (grace_period_seconds / poll_interval_seconds).
            # Default: 3 ticks of silence → re-seed.
            # Must be > 1 to avoid re-seeding mid-generation during the brief
            # moment when old cells have died but new ones haven't registered yet.
            - name: EXTINCTION_GRACE_TICKS
              value: "3"

            # Patterns the perceiver can choose from on re-seed.
            # It picks one at random — so each new world begins differently.
            # Format: name=x,y;x,y;x,y  separated by |
            - name: SEED_PATTERNS
              value: |
                glider=10,9;11,10;9,11;10,11;11,11|
                blinker=10,10;10,11;10,12|
                toad=9,10;10,10;11,10;10,11;11,11;12,11|
                r-pentomino=11,10;12,10;10,11;11,11;11,12

          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5

---
# The perceiver is reachable at http://<tailscale-ip>:30080 from anywhere
# on your Tailscale network — no Ingress controller needed.
apiVersion: v1
kind: Service
metadata:
  name: perceiver-svc
  namespace: gol
spec:
  type: NodePort
  selector:
    app: gol-perceiver
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
